repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'pip install -q -e ".[dev]" && pytest'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
